name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ── 2. Setup Python ────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn joblib

      # ── 4. Run MLflow Project ──────────────────────────────────────────────
      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      # ── 5. Hardcode run_id yang sudah diketahui ────────────────────────────
      - name: Get latest MLflow run_id
        run: |
          # Cari run_id.txt di seluruh workspace
          RUN_ID_FILE=$(find . -name "run_id.txt" 2>/dev/null | head -n 1)

          if [ -n "$RUN_ID_FILE" ]; then
            RUN_ID=$(cat "$RUN_ID_FILE" | tr -d '[:space:]')
            echo "Ditemukan di: $RUN_ID_FILE"
          else
            # Fallback: scan mlruns/
            RUN_ID=$(ls -td mlruns/0/*/ 2>/dev/null | head -n 1 | cut -d'/' -f3)
            echo "Fallback dari mlruns/"
          fi

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: RUN_ID kosong!"
            exit 1
          fi

          echo "RUN_ID=${RUN_ID}" >> $GITHUB_ENV
          echo "Run ID: ${RUN_ID}"

      # ── 6. Verifikasi RUN_ID berhasil di-set ──────────────────────────────
      - name: Verify RUN_ID
        run: |
          echo "RUN_ID = ${{ env.RUN_ID }}"
          if [ -z "${{ env.RUN_ID }}" ]; then
            echo "ERROR: RUN_ID kosong di env!"
            exit 1
          fi

      # ── 7. Upload mlruns/ sebagai artifact GitHub (SKILLED) ────────────────
      - name: Upload MLflow Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifact-${{ env.RUN_ID }}
          path: |
            mlruns/
          retention-days: 30

      # ── 8. Build Docker dari model MLflow (ADVANCE) ────────────────────────
      - name: Build Docker Model
        run: |
          echo "Building docker untuk run: ${{ env.RUN_ID }}"
          mlflow models build-docker \
            --model-uri "runs:/${{ env.RUN_ID }}/model" \
            --name "retail-sales-forecasting"

      # ── 9. Login ke Docker Hub ─────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD}}

      # ── 10. Tag & Push Docker Image ────────────────────────────────────────
      - name: Tag Docker Image
        run: |
          docker tag retail-sales-forecasting \
            ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:latest
          docker tag retail-sales-forecasting \
            ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:${{ env.RUN_ID }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:${{ env.RUN_ID }}