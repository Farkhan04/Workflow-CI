name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLProject/dataset_sample.csv"
  TARGET_VAR: "sales"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          echo "CSV_URL    = $CSV_URL"
          echo "TARGET_VAR = $TARGET_VAR"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0

      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(python3 -c "
          import glob, os
          exp_dirs = sorted(glob.glob('mlruns/[0-9]*'), key=os.path.getmtime, reverse=True)
          for exp in exp_dirs:
              run_dirs = sorted(
                  [d for d in glob.glob(f'{exp}/*/') if not os.path.basename(d.rstrip('/')) == 'meta.yaml'],
                  key=os.path.getmtime, reverse=True
              )
              for r in run_dirs:
                  run_id = r.strip('/').split('/')[-1]
                  if len(run_id) == 32:
                      print(run_id)
                      exit()
          ")
          echo "RUN_ID=${RUN_ID}" >> $GITHUB_ENV
          echo "Latest run_id: ${RUN_ID}"

      - name: Install Python dependencies
        run: |
          pip install pandas numpy scikit-learn joblib

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifact-${{ env.RUN_ID }}
          path: mlruns/
          retention-days: 30

      - name: Build Docker Model
        run: |
          # Cari path MLmodel
          MODEL_PATH=$(python3 -c "
          import glob, os
          files = sorted(glob.glob('mlruns/**/MLmodel', recursive=True), key=os.path.getmtime, reverse=True)
          if files:
              print(os.path.dirname(os.path.abspath(files[0])))
          ")
          echo "MODEL_PATH = $MODEL_PATH"

          # Patch SEMUA file yang menyebabkan python3.9 di Dockerfile:
          # 1. MLmodel
          # 2. python_env.yaml
          # 3. conda.yaml di dalam artifact
          echo "=== Patch semua python version ==="
          find mlruns -name "MLmodel" | while read f; do
            sed -i 's/python_version: .*/python_version: 3.12.7/' "$f"
            echo "Patched: $f"
          done

          find mlruns -name "python_env.yaml" | while read f; do
            sed -i 's/python==.*/python==3.12.7/' "$f"
            sed -i 's/- python.*/- python=3.12.7/' "$f"
            echo "Patched: $f"
            cat "$f"
          done

          find mlruns -name "conda.yaml" | while read f; do
            sed -i 's/python=.*/python=3.12.7/' "$f"
            echo "Patched: $f"
            cat "$f"
          done

          echo "=== MLmodel final ==="
          cat $(find mlruns -name MLmodel | head -1)

          mlflow models build-docker \
            --model-uri "$MODEL_PATH" \
            --name "retail-sales-forecasting"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag retail-sales-forecasting \
            ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:latest
          docker tag retail-sales-forecasting \
            ${{ secrets.DOCKER_PASSWORD }}/retail-sales-forecasting:${{ env.RUN_ID }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:latest
          docker push ${{ secrets.DOCKER_PASSWORD }}/retail-sales-forecasting:${{ env.RUN_ID }}