name: MLflow CI

on:
  push:
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install mlflow pandas numpy scikit-learn joblib

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local --experiment-name "Retail Sales Forecasting"
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"

      - name: Get Latest Run ID
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"
          
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: mlruns/

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Model
        run: |
          mlflow models build-docker \
          --model-uri "runs:/$RUN_ID/model" \
          --name "retail-sales-forecasting"

      - name: Tag Docker Image
        run: |
          docker tag retail-sales-forecasting \
          farkhan03/retail-sales-forecasting:latest

      - name: Push Docker Image
        run: |
          docker push farkhan03/retail-sales-forecasting:latest