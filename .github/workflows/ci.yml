name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLProject/dataset_sample.csv"
  TARGET_VAR: "sales"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # ── 2. Setup Python 3.12.7 ─────────────────────────────────────────────
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # ── 3. Check Env ───────────────────────────────────────────────────────
      - name: Check Env
        run: |
          echo "CSV_URL    = $CSV_URL"
          echo "TARGET_VAR = $TARGET_VAR"

      # ── 4. Install dependencies (mlflow only) ──────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0

      # ── 5. Run mlflow project ──────────────────────────────────────────────
      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      # ── 6. Get latest MLflow run_id ────────────────────────────────────────
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(python3 -c "
          import glob, os
          exp_dirs = sorted(glob.glob('mlruns/[0-9]*'), key=os.path.getmtime, reverse=True)
          for exp in exp_dirs:
              run_dirs = sorted(
                  [d for d in glob.glob(f'{exp}/*/') if not os.path.basename(d.rstrip('/')) == 'meta.yaml'],
                  key=os.path.getmtime, reverse=True
              )
              for r in run_dirs:
                  run_id = r.strip('/').split('/')[-1]
                  if len(run_id) == 32:
                      print(run_id)
                      exit()
          ")
          echo "RUN_ID=${RUN_ID}" >> $GITHUB_ENV
          echo "Latest run_id: ${RUN_ID}"

      # ── 7. Install Python dependencies (untuk upload artifact) ─────────────
      - name: Install Python dependencies
        run: |
          pip install pandas numpy scikit-learn joblib

      # ── 8. Upload to GitHub (pengganti Upload to Google Drive) ─────────────
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifact-${{ env.RUN_ID }}
          path: mlruns/
          retention-days: 30

      # ── 9. Build Docker Model ──────────────────────────────────────────────
      - name: Build Docker Model
        run: |
          MODEL_URI=$(python3 -c "
          import glob, os
          files = glob.glob('mlruns/**/MLmodel', recursive=True)
          if files:
              parts = files[0].replace('\\\\', '/').split('/')
              run_id = parts[2]
              print(f'runs:/{run_id}/model')
          ")
          echo "MODEL_URI = $MODEL_URI"
          mlflow models build-docker \
            --model-uri "$MODEL_URI" \
            --name "retail-sales-forecasting"

      # ── 10. Log in to Docker Hub ───────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 11. Tag Docker Image ───────────────────────────────────────────────
      - name: Tag Docker Image
        run: |
          docker tag retail-sales-forecasting \
            ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:latest
          docker tag retail-sales-forecasting \
            ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:${{ env.RUN_ID }}

      # ── 12. Push Docker Image ──────────────────────────────────────────────
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/retail-sales-forecasting:${{ env.RUN_ID }}